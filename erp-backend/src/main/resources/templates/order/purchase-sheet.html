<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>발 주 서</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet"
    />
    <style>
        body { font-size: 12pt; box-sizing: border-box; width: 210mm; height: 297mm; padding: 5mm; font-family: '맑은 고딕', 'Malgun Gothic', "apple sd", sans-serif; margin: auto;}
        th, td { padding: 8px; vertical-align: middle; border: 1px solid gray; word-break: keep-all; text-align: center; }
        @media print {
            button { display: none !important; }
        }
    </style>
  </head>
  <body>
    <div class="text-end mb-2">
      <button class="btn btn-outline-dark" onclick="window.print()">
        🖨️ Print
      </button>
    </div>
    <div class="d-flex">
      <div class="fs-1 fw-bold d-flex justify-content-center align-items-center" style="width: 60%">
        <span>발 주 서</span>
      </div>
      <table class="table" style="width: 40%">
        <tr style="font-size: 12px">
          <th class="p-0" style="height: 100px; width: 20px; writing-mode: vertical-lr;" rowspan="2">결재</th>
          <th class="px-1" style="height: 10px; font-size: 10px" th:each="gline : ${gLines}">
            <span th:text="${gline}"></span>
          </th>
        </tr>
        <tr>
          <td style="height: 70px; width: 70px;" th:each="gline : ${gLines}" ></td>
        </tr>
      </table>
    </div>
    <table class="table mb-4" style="table-layout: fixed; font-size: 12px;">
      <colgroup>
        <col style="width: 10%;">
        <col />
        <col style="width: 10%;">
        <col />
      </colgroup>
      <tbody>
        <tr>
          <th>발신</th>
          <th>
            <span th:text="${orderMst['cmpynm']}"></span>
            <div style="margin-left: 5px;">
              <svg id="barcode"></svg>
          </div>
           
          </th>
          <th>발주일자</th>
          <th class="fw-medium">
            <span th:text="${orderMst['balymd']}"></span>
          </th>
        </tr>
        <tr>
          <th>수신</th>
          <th>
            <span th:text="${orderMst['custnm']}"></span>
          </th>
          <th>입고일자</th>
          <th class="fw-medium">
            <span th:text="${orderMst['reqymd']}"></span>
          </th>
        </tr>
        <tr>
          <td colspan="4" class="text-start">
            <span>1. 귀사의 일약 번창하심을 기원합니다.</span>
          </td>
        </tr>
        <tr>
          <td colspan="4" class="text-start">
            <span>2. 아래와 같이 발주하오니 검토하시고 납기를 준수하여 주시기 바랍니다.</span>
          </td>
        </tr>
      </tbody>
    </table>

    <table class="table table-striped" style="table-layout: fixed; font-size: 12px;">
      <colgroup>
        <col />
        <col />
        <col style="width: 8%" />
        <col style="width: 8%" />
        <col style="width: 10%" />
        <col style="width: 14%" />
        <col style="width: 14%" />
        <col style="width: 14%" />
      </colgroup>
      <thead>
        <tr>
          <th>품목명</th>
          <th>규격</th>
          <th>단위</th>
          <th>수량</th>
          <th>단가</th>
          <th>공급가</th>
          <th>부가세</th>
          <th>합계</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="details : ${orderDtl}">
          <td>
            <span th:text="${details['itemnm']}"></span>
          </td>
          <td>
            <span th:text="${details['itsize']}"></span>
          </td>
          <td>
            <span th:text="${details['unit']}"></span>
          </td>
          <td class="text-end">
            <span th:text="${#numbers.formatInteger(details['balqty'], '0', 'COMMA')}"></span>
          </td>
          <td class="text-end">
            <span th:text="${#numbers.formatInteger(details['price'], '0', 'COMMA')}"></span>
          </td>
          <td class="text-end">
            <span th:text="${#numbers.formatInteger(details['balamt'], '0', 'COMMA')}"></span>
          </td>
          <td class="text-end">
            <span th:text="${#numbers.formatInteger(details['balvat'], '0', 'COMMA')}"></span>
          </td>
          <td class="text-end">
            <span th:text="${#numbers.formatInteger(details['totamt'], '0', 'COMMA')}"></span>
          </td>
        </tr>
        <tr th:if="${orderDtl.size() < 18}" th:each="tableRows : ${#numbers.sequence(1, 18 - orderDtl.size())}">
          <td th:each="tableDatas : ${#numbers.sequence(1, 8)}" style="height: 32px;"></td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td class="fw-bold">
            <span>합계</span>
          </td>
          <td th:each="tableDatas : ${#numbers.sequence(2, 5)}" style="height: 32px"></td>
          <td class="text-end fw-bold">
            <span>₩ <span th:text="${#numbers.formatInteger(orderMst['totalAmount'], '0', 'COMMA')}"></span></span>
          </td>
          <td class="text-end fw-bold">
            <span>₩ <span th:text="${#numbers.formatInteger(orderMst['totalVat'], '0', 'COMMA')}"></span></span>
          </td>
          <td class="text-end fw-bold">
            <span>₩ <span th:text="${#numbers.formatInteger(orderMst['totalPrice'], '0', 'COMMA')}"></span></span>
          </td>
        </tr>
      </tfoot>
    </table>
    <table class="table" style="table-layout: fixed;">
      <colgroup>
        <col style="width: 10%;" />
        <col />
      </colgroup>
      <tr>
        <th style="font-size: 12px">특이사항</th>
        <td style="text-align: left; font-size: 12px">
          <span th:text="${orderMst['remark']}"></span>
        </td>
      </tr>
    </table>
    <script th:inline="javascript">
      /*<![CDATA[*/
      // 주석(/*...*/)을 사용하여 IDE의 문법 검사를 피하고 Thymeleaf가 값을 주입하게 합니다.
      var balno = /*[[${orderMst['balno']}]]*/ "000000000000";
      
      if (balno && balno !== "000000000000") {
          JsBarcode("#barcode", balno, {
              format: "CODE128",
              width: 2,           // 막대 두께
              height: 40,         // 바코드 높이
              displayValue: false, // 바코드 아래에 숫자 표시 여부
              fontSize: 14,
              margin: 0
          });
      } else {
          console.error("발주번호가 없거나 유효하지 않습니다.");
      }
      /*]]>*/
  </script>
  </body>
</html>
