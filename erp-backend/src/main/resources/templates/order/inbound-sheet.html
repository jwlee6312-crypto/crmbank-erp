<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>입 고 의 뢰 서</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet"
    />
    <style>
        body {
            font-size: 12px;
            font-family: '맑은 고딕', 'Malgun Gothic', "apple sd", sans-serif;
            margin: auto;
            padding: 5mm
        }

        th, td {
            padding: 8px;
            vertical-align: middle;
            border: 1px solid gray;
            word-break: keep-all;
            text-align: center;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 5mm;
            box-sizing: border-box;
            margin: auto;
            page-break-after: always;
        }

        @media print {
            .page {
                margin: 0;
                page-break-after: always;
            }

            button { display: none !important; }
        }
    </style>
  </head>
  <body>
    <div class="text-end mb-2">
      <button class="btn btn-outline-dark" onclick="window.print()">
        🖨️ Print
      </button>
    </div>
    <div class="page" th:each="print : ${printList}">
      <div class="d-flex">
        <div class="fs-1 fw-bold d-flex justify-content-center align-items-center" style="width: 60%">
          <span>입 고 의 뢰 서</span>
        </div>
        <table class="table" style="width: 40%">
          <tr style="font-size: 12px">
            <th class="p-0" style="height: 100px; width: 20px; writing-mode: vertical-lr;" rowspan="2">결재</th>
            <th class="px-1" style="height: 10px; font-size: 10px" th:each="gline : ${gLines}">
              <span th:text="${gline}"></span>
            </th>
          </tr>
          <tr>
            <td style="height: 70px; width: 70px;" th:each="gline : ${gLines}" ></td>
          </tr>
        </table>
      </div>
      <table class="table mb-4" style="table-layout: fixed;">
        <colgroup>
          <col style="width: 10%" />
          <col />
          <col style="width: 10%" />
          <col />
          <col style="width: 10%" />
          <col />
          <col style="width: 10%" />
          <col />
        </colgroup>
        <tbody>
        <tr>
          <th>입고번호</th>
          <td colspan="3">
            <span th:text="${print.mst['iono']}"></span>
          </td>
          <th>회사명</th>
          <td colspan="3">
            <span th:text="${print.mst['custnm']}"></span>
          </td>
        </tr>
        <tr>
          <th>입고일자</th>
          <td colspan="3">
            <span th:text="${print.mst['ioymd']}"></span>
          </td>
          <th>등록번호</th>
          <td colspan="3">
            <span th:text="${print.mst['custno']}"></span>
          </td>
        </tr>
        <tr>
          <th>입고창고</th>
          <td colspan="3">
            <span th:text="${print.mst['whnm']}"></span>
          </td>
          <th>소재지</th>
          <td colspan="3">
            <span th:text="${print.mst['address'] + ' ' + print.mst['d_address']}"></span>
          </td>
        </tr>
        <tr>
          <th>입고부서</th>
          <td colspan="3">
            <span th:text="${print.mst['deptnm']}"></span>
          </td>
          <th>연락처</th>
          <td>
            <span th:text="${print.mst['cust_telno']}"></span>
          </td>
          <th>팩스</th>
          <td>
            <span th:text="${print.mst['cust_faxno']}"></span>
          </td>
        </tr>
        <tr>
          <th>담당자</th>
          <td colspan="3">
            <span th:text="${print.mst['usernm']}"></span>
          </td>
          <th>담당자</th>
          <td colspan="3">
            <span th:text="${print.mst['cust_usernm']}"></span>
          </td>
        </tr>
        <tr>
          <th>입고구분</th>
          <td colspan="3">
            <span th:text="${print.mst['iotypenm']}"></span>
          </td>
          <th>담당연락처</th>
          <td colspan="3">
            <span th:text="${print.mst['cust_telno']}"></span>
          </td>
        </tr>
        <tr>
          <th>특기사항</th>
          <td colspan="7" class="text-start">
            <span th:text="${print.mst['remark']}"></span>
          </td>
        </tr>
        </tbody>
      </table>

      <table class="table table-striped" style="table-layout: fixed;">
        <colgroup>
          <col />
          <col />
          <col style="width: 7%" />
          <col style="width: 10%" />
          <col style="width: 15%" />
          <col style="width: 15%" />
        </colgroup>
        <thead>
          <tr>
            <th>상품명</th>
            <th>상품코드</th>
            <th>단위</th>
            <th>수량</th>
            <th>단가</th>
            <th>금액</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="details : ${print.dtl}">
            <td>
              <span th:text="${details['itemnm']}"></span>
            </td>
            <td>
              <span th:text="${details['itemcd']}"></span>
            </td>
            <td>
              <span th:text="${details['unit']}"></span>
            </td>
            <td class="text-end">
              <span th:text="${#numbers.formatInteger(details['ioqty'], '0', 'COMMA')}"></span>
            </td>
            <td class="text-end">
              <span th:text="${#numbers.formatInteger(details['price'], '0', 'COMMA')}"></span>
            </td>
            <td class="text-end">
              <span th:text="${#numbers.formatInteger(details['ioamt'], '0', 'COMMA')}"></span>
            </td>
          </tr>
          <tr th:if="${print.dtl.size() < 18}" th:each="tableRows : ${#numbers.sequence(1, 18 - print.dtl.size())}">
            <td th:each="tableDatas : ${#numbers.sequence(1, 6)}" style="height: 32px;"></td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <td class="fw-bold">
              <span>합계</span>
            </td>
            <td th:each="tableDatas : ${#numbers.sequence(2, 5)}" style="height: 32px"></td>
            <td class="text-end fw-bold">
              <span>₩ <span th:text="${#numbers.formatInteger(print.mst['totalPrice'], '0', 'COMMA')}"></span></span>
            </td>
          </tr>
        </tfoot>
      </table>
    </div>
  </body>
</html>
