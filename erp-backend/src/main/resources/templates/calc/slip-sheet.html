<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회계전표 출력</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { font-size: 10pt; box-sizing: border-box; width: 210mm; padding: 10mm; font-family: '굴림', 'Gulim', sans-serif; margin: auto; }
        .print-area { width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th, td { border: 1px solid #333; padding: 4px; vertical-align: middle; text-align: center; height: 25px; }
        .bg-gray { background-color: #eeeeee !important; -webkit-print-color-adjust: exact; }
        .text-start { text-align: left; }
        .text-end { text-align: right; }
        .title-area { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .title-text { font-size: 24pt; font-weight: bold; text-decoration: underline; width: 60%; text-align: center; padding-top: 20px; }
        .approval-table { width: 350px; float: right; }
        .approval-table th { height: 20px; font-size: 9pt; }
        .approval-table td { height: 60px; width: 60px; }
        .info-table th { width: 15%; }
        .info-table td { width: 18%; }
        .dtl-table th { font-size: 9pt; }
        .sub-detail { font-size: 8pt; color: #555; text-align: left; padding-left: 10px; height: 20px; }
        .page-break { page-break-after: always; }
        @media print {
            button { display: none !important; }
            body { padding: 0; margin: 0; }
        }
    </style>
</head>
<body>
    <div class="text-end mb-2">
        <button class="btn btn-sm btn-outline-dark" onclick="window.print()">🖨️ 인쇄하기</button>
    </div>

    <!-- 전표 데이터 출력 (페이징 처리는 단순화를 위해 단일 페이지 또는 테이블 흐름으로 구성) -->
    <div class="print-area">
        <div class="title-area">
            <div class="title-text">회 계 전 표</div>
            <table class="approval-table">
                <tr>
                    <th class="bg-gray" rowspan="2" style="width: 30px; writing-mode: vertical-lr;">결재</th>
                    <th class="bg-gray" th:each="gline : ${gLines}" th:text="${gline}"></th>
                </tr>
                <tr>
                    <td th:each="gline : ${gLines}"></td>
                </tr>
            </table>
        </div>

        <table class="info-table">
            <tr>
                <th class="bg-gray">전표번호</th>
                <td th:text="${master['SLIPYMD'] + '-' + master['SLIPNO']}"></td>
                <th class="bg-gray">회계일자</th>
                <td th:text="${#strings.length(master['ACCTYMD']) == 8 ? #strings.substring(master['ACCTYMD'],0,4)+'년 '+#strings.substring(master['ACCTYMD'],4,6)+'월 '+#strings.substring(master['ACCTYMD'],6,8)+'일' : ''}"></td>
                <th class="bg-gray" rowspan="2">작 성 자</th>
                <td rowspan="2" th:text="${master['USERNM'] + ' (인)'}"></td>
            </tr>
            <tr>
                <th class="bg-gray">발행부서</th>
                <td th:text="${master['DEPTNM']}"></td>
                <th class="bg-gray">작성일자</th>
                <td th:text="${#strings.length(master['SLIPYMD']) == 8 ? #strings.substring(master['SLIPYMD'],0,4)+'년 '+#strings.substring(master['SLIPYMD'],4,6)+'월 '+#strings.substring(master['SLIPYMD'],6,8)+'일' : ''}"></td>
            </tr>
            <tr>
                <th class="bg-gray">거래내역</th>
                <td colspan="3" class="text-start" th:text="${'&nbsp;' + master['BUSINESS']}"></td>
                <th class="bg-gray">지출예정일</th>
                <td></td>
            </tr>
        </table>

        <table class="dtl-table">
            <thead>
                <tr class="bg-gray">
                    <th rowspan="2" style="width: 40px;">No</th>
                    <th rowspan="2" style="width: 150px;">계정과목</th>
                    <th>적 요</th>
                    <th style="width: 120px;">차 변</th>
                    <th style="width: 120px;">대 변</th>
                </tr>
                <tr class="bg-gray">
                    <th colspan="3">세 부 내 역</th>
                </tr>
            </thead>
            <tbody>
                <th:block th:each="row, iter : ${details}">
                    <tr>
                        <td rowspan="2" th:text="${row['SROWNO']}"></td>
                        <td rowspan="2" class="text-start">
                            <span th:text="${row['ACCTNM']}"></span><br/>
                            <small th:text="${row['ACCTCD']}"></small>
                        </td>
                        <td class="text-start" th:text="${row['REMARK']}"></td>
                        <td class="text-end" th:text="${row['DBAMT'] > 0 ? #numbers.formatInteger(row['DBAMT'], 0, 'COMMA') : ''}"></td>
                        <td class="text-end" th:text="${row['CRAMT'] > 0 ? #numbers.formatInteger(row['CRAMT'], 0, 'COMMA') : ''}"></td>
                    </tr>
                    <tr>
                        <td colspan="3" class="sub-detail">
                            <span th:if="${row['DEPTNM'] != null}" th:text="${row['DEPTNM'] + ' | '}"></span>
                            <span th:if="${row['CUSTNM'] != null}" th:text="${row['CUSTNM'] + ' | '}"></span>
                            <span th:if="${row['MGTNO'] != null}" th:text="${row['MGTNO'] + ' | '}"></span>
                            <span th:if="${row['PRJNM'] != null}" th:text="${row['PRJNM'] + ' | '}"></span>
                            <span th:if="${row['BILLGBNNM'] != null}" th:text="${row['BILLGBNNM']}"></span>
                        </td>
                    </tr>
                </th:block>
                <!-- 빈 행 추가 (10행 맞춤) -->
                <th:block th:if="${details.size() < 10}" th:each="i : ${#numbers.sequence(details.size() + 1, 10)}">
                    <tr>
                        <td rowspan="2" th:text="${i}"></td>
                        <td rowspan="2"></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <td colspan="3" class="sub-detail"></td>
                    </tr>
                </th:block>
            </tbody>
            <tfoot>
                <tr class="bg-gray fw-bold">
                    <td colspan="3">합 계</td>
                    <td class="text-end" th:text="${#numbers.formatInteger(totalDbAmt, 0, 'COMMA')}"></td>
                    <td class="text-end" th:text="${#numbers.formatInteger(totalCrAmt, 0, 'COMMA')}"></td>
                </tr>
            </tfoot>
        </table>

        <!-- 하단 의견란 및 원인 정보 (ASP 재현) -->
        <div class="row g-0">
            <div class="col-7">
                <table style="width: 98%;">
                    <tr>
                        <th class="bg-gray" style="width: 60px;">결재자<br/>의견란</th>
                        <td style="height: 80px;"></td>
                    </tr>
                </table>
            </div>
            <div class="col-5">
                <table class="approval-table" style="width: 100%;">
                    <tr>
                        <th class="bg-gray" rowspan="2" style="width: 30px; writing-mode: vertical-lr;">원인</th>
                        <th class="bg-gray" th:each="gline : ${gLines}" th:text="${gline}"></th>
                    </tr>
                    <tr>
                        <td th:each="gline : ${gLines}" style="height: 60px;"></td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="d-flex justify-content-between mt-3" style="font-size: 9pt;">
            <div th:text="${company['CMPYNM']}"></div>
            <div>Printed by ERP System</div>
        </div>
    </div>
</body>
</html>
