<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Specification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet"
    />
    <style>
        body {
            font-size: 12px;
            font-family: '맑은 고딕', 'Malgun Gothic', "apple sd", sans-serif;
            margin: auto;
            padding: 5mm
        }

        th, td {
            padding: 8px;
            vertical-align: middle;
            border: 1px solid gray;
            word-break: keep-all;
            text-align: center;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 5mm;
            box-sizing: border-box;
            margin: auto;
            page-break-after: always;
        }

        @media print {
            .page {
                margin: 0;
                page-break-after: always;
            }

            button { display: none !important; }
        }
    </style>
  </head>
  <body>
    <div class="text-end mb-2">
      <button class="btn btn-outline-dark" onclick="window.print()">
        🖨️ Print
      </button>
    </div>
    <div class="page" th:each="print : ${printList}">
      <div class="d-flex flex-column align-items-center justify-content-center">
        <div class="fs-1 fw-bold">
          거 래 명 세 서
        </div>
        <div class="fs-6 fw-lighter">
          (공급받는자 보관용)
        </div>
      </div>

      <table class="table" style="font-size: 12px; table-layout: fixed; margin-bottom: 20px">
        <colgroup>
          <col style="width: 10%" />
          <col/>
          <col style="width: 10%" />
          <col/>
          <col style="width: 10%" />
          <col/>
          <col style="width: 10%" />
          <col/>
        </colgroup>
        <thead>
        <tr>
          <th colspan="4" rowspan="3" style="vertical-align: middle; font-weight: normal;">
            <div class="d-flex flex-column align-items-center">
              <div style="font-size: 14px; margin-bottom: 10px">
                  <span th:text="${print.mst['ioymd']}">
                  </span>
              </div>
              <div class="gap-4 d-flex align-items-center w-100 justify-content-center">
                <span style="font-size: 16px" th:text="${print.mst['custnm']}"></span>
                <span>귀중</span>
              </div>
            </div>
          </th>
          <th colspan="4">
            <div class="gap-3 d-flex align-items-center justify-content-center" style="font-size: 16px; font-weight: normal;">
              <span>공</span><span>급</span><span>자</span>
            </div>
          </th>
        </tr>
        <tr>
          <th style="font-weight: normal;">등록번호</th>
          <th style="font-weight: normal;" colspan="3">
            <span th:text="${print.mst['oursaupno']}"></span>
          </th>
        </tr>
        <tr>
          <th style="font-weight: normal">상호</th>
          <th style="font-weight: normal">
            <span th:text="${print.mst['ourcmpynm']}"></span>
          </th>
          <th style="font-weight: normal">성명</th>
          <th style="font-weight: normal">
            <div class="d-flex align-items-center gap-2">
              <div style="text-align: left;">
                <span th:text="${print.mst['ourbossnm']}"></span>
              </div>
              <div style="position: relative;">
                <img th:src="@{${resourcePrefix + '/billing/stamp.png'}}" alt="stamp" width="60" style="position: absolute; top:-30px;" />
              </div>
            </div>
          </th>
        </tr>
        </thead>
        <tbody>
        <tr>
          <td>배송처</td>
          <td colspan="3" style="padding: 0">
            <span th:text="${print.mst['address']} + ' ' + ${print.mst['d_address']} "></span>
          </td>
          <td>사업장</td>
          <td colspan="3" style="padding: 0;">
            <span th:text="${print.mst['ouraddress']} + ' ' + ${print.mst['ourd_address']} "></span>
          </td>
        </tr>
        <tr>
          <td>담당자</td>
          <td>
            <span th:text="${print.mst['cust_name']}"></span>
          </td>
          <td>연락처</td>
          <td>
            <span th:text="${print.mst['cust_telno']}"></span>
          </td>
          <td>업태</td>
          <td>
            <span th:text="${print.mst['ouruptae']}"></span>
          </td>
          <td>종목</td>
          <td>
            <span th:text="${print.mst['ourupjong']}"></span>
          </td>
        </tr>
        <tr>
          <td>특기사항</td>
          <td colspan="7" style="text-align: left">
            <span th:text="${print.mst['remark']}"></span>
          </td>
        </tr>
        <tr>
          <td colspan="8" style="text-align: center; font-size: 14px; font-weight: bold">
            <span>
              합계금액 ( VAT 포함 ) : ₩ <span th:text="${#numbers.formatInteger(print.mst['totamt'], 0, 'COMMA')}"></span>
            </span>
          </td>
        </tr>
        </tbody>
      </table>

      <table class="table table-striped" style="table-layout: fixed; font-size: 12px;">
        <colgroup>
          <col style="width: 12%" />
          <col style="width: 10%" />
          <col style="width: 20%" />
          <col style="width: 6%" />
          <col style="width: 6%" />
          <col style="width: 6%" />
          <col />
          <col />
          <col />
        </colgroup>
        <thead>
        <tr>
          <th>날짜</th>
          <th>상품코드</th>
          <th>상품명</th>
          <th>규격</th>
          <th>단위</th>
          <th>수량</th>
          <th>공급가액</th>
          <th>부가세</th>
          <th>합계</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="details : ${print.dtl}">
          <td>
            <span th:text="${details['ioymd']}"></span>
          </td>
          <td>
            <span th:text="${details['itemcd']}"></span>
          </td>
          <td class="text-start">
            <span th:text="${details['itemnm']}"></span>
          </td>
          <td>
            <span th:text="${details['itsize'] != null ? details['itsize'] : ''}"></span>
          </td>
          <td>
            <span th:text="${details['unit']}"></span>
          </td>
          <td class="text-end">
            <span th:text="${#numbers.formatInteger(details['qty'], 0, 'COMMA')}"></span>
          </td>
          <td class="text-end">
            <span th:text="${#numbers.formatInteger(details['spyamt'], 0, 'COMMA')}"></span>
          </td>
          <td class="text-end">
            <span th:text="${#numbers.formatInteger(details['vatamt'], 0, 'COMMA')}"></span>
          </td>
          <td class="text-end">
            <span th:text="${#numbers.formatInteger(details['totamt'], 0, 'COMMA')}"></span>
          </td>
        </tr>
        <tr th:if="${print.dtl.size() < 18}" th:each="tableRows : ${#numbers.sequence(1, 18 - print.dtl.size())}">
          <td th:each="tableDatas : ${#numbers.sequence(1, 9)}" style="height: 32px;"></td>
        </tr>
        <tr>
          <td style="font-weight: bold;">합계</td>
          <td th:each="tableDatas : ${#numbers.sequence(2, 8)}" style="height: 32px"></td>
          <td th:text="'₩ '+${#numbers.formatInteger(print.mst['totamt'], 0, 'COMMA')}"
              style="text-align: right; font-weight: bold;"></td>
        </tr>
        </tbody>
      </table>

      <table class="table" style="font-size: 12px; table-layout: fixed">
        <colgroup>
          <col style="width: 12%" />
          <col style="width: 60%" />
          <col style="width: 12%" />
        </colgroup>
        <tr>
          <td>미수금</td>
          <td></td>
          <td>담당자</td>
          <td></td>
        </tr>
        <tr>
          <td colspan="2">상기품목을 정히 납품함.</td>
          <td>인수자</td>
          <td style="text-align: right">(인)</td>
        </tr>
      </table>
    </div>
  </body>
</html>
