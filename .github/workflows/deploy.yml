name: ERP 시스템 자동 배포 (CI/CD)

on:
  push:
    branches: [ "main" ]
  # 💡 [추가] GitHub 웹사이트에서 수동으로 배포 실행 가능하게 함
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    steps:
    - name: 🔍 1. 소스코드 체크아웃
      uses: actions/checkout@v3

    - name: 🏗️ 2. 프론트엔드 빌드 및 이미지 생성
      run: |
        echo "🚀 프론트엔드 빌드 시작..."
        cd erp-frontend
        docker build -t erp-frontend:latest -f ../k8s-deploy/frontend/Dockerfile .
        docker save erp-frontend:latest | microk8s ctr image import -

    - name: 🏗️ 3. 백엔드 빌드 및 이미지 생성
      run: |
        echo "🚀 백엔드 빌드 시작..."
        cd erp-backend
        sed -i 's/\r$//' gradlew
        chmod +x gradlew
        docker build -t erp-backend:latest .
        docker save erp-backend:latest | microk8s ctr image import -

    - name: 🚀 4. 쿠버네티스 최종 배포
      run: |
        echo "☸️ 쿠버네티스 설정 적용 및 재시작..."
        microk8s kubectl apply -f k8s-deploy/frontend/deployment.yaml
        microk8s kubectl rollout restart deployment erp-frontend
        microk8s kubectl rollout restart deployment erp-backend
        echo "✅ 모든 배포 공정이 완료되었습니다."
