apiVersion: v1
kind: ConfigMap
metadata:
  name: erp-frontend-config
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        include /etc/nginx/mime.types;
        charset utf-8;

        # 1. 화면 및 정적 파일
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 2. 💡 모든 API 요청 처리
        location /api/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie $http_cookie;

            # 💡 [중요] 쿠키 경로를 원본 주소(/)로 유지하여 세션 유실 방지
            proxy_cookie_path / /;

            # 백엔드가 루트(/) 기반이므로 /api/ 를 떼고 전달
            proxy_pass http://erp-backend-service:8080/;
            
            # 백엔드 에러 발생 시 Nginx가 index.html을 대신 보내지 못하게 차단
            proxy_intercept_errors off;
        }

        # 3. 💡 [중단] WebSocket 부분은 에러 해결 전까지 막아둡니다.
        # location /ws/cti {
        #     proxy_pass http://erp-backend-service:8080/ws/cti;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "Upgrade";
        #     proxy_set_header Host $host;
        # }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erp-frontend
  template:
    metadata:
      labels:
        app: erp-frontend
    spec:
      containers:
      - name: erp-frontend
        image: erp-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: nginx-config
        configMap:
          name: erp-frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: erp-frontend-service
spec:
  selector:
    app: erp-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
