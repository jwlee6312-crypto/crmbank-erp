# [1] Chatwoot 공통 설정
apiVersion: v1
kind: ConfigMap
metadata:
  name: chatwoot-config
data:
  FRONTEND_URL: "http://172.19.206.69:30300"
  REDIS_URL: "redis://chatwoot-redis:6379/0"
  POSTGRES_HOST: "chatwoot-postgres"
  POSTGRES_DATABASE: "chatwoot"
  POSTGRES_USERNAME: "chatwoot"
  RAILS_ENV: "production"
  RAILS_LOG_TO_STDOUT: "true"
---
# [2] PostgreSQL (pgvector 포함)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatwoot-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatwoot-postgres
  template:
    metadata:
      labels:
        app: chatwoot-postgres
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:pg12
        env:
        - name: POSTGRES_DB
          value: "chatwoot"
        - name: POSTGRES_USER
          value: "chatwoot"
        - name: POSTGRES_PASSWORD
          value: "gkdldhs12#$"
        resources:
          limits:
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: chatwoot-postgres
spec:
  selector:
    app: chatwoot-postgres
  ports:
    - port: 5432
---
# [3] Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatwoot-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatwoot-redis
  template:
    metadata:
      labels:
        app: chatwoot-redis
    spec:
      containers:
      - name: redis
        image: redis:6-alpine
---
apiVersion: v1
kind: Service
metadata:
  name: chatwoot-redis
spec:
  selector:
    app: chatwoot-redis
  ports:
    - port: 6379
---
# [4] Chatwoot Web
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatwoot-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatwoot-web
  template:
    metadata:
      labels:
        app: chatwoot-web
    spec:
      # 💡 [핵심 조치] 서버가 뜨기 전 DB 초기화를 자동으로 수행합니다.
      initContainers:
      - name: db-prepare
        image: chatwoot/chatwoot:latest
        command: ["bundle", "exec", "rails", "db:chatwoot_prepare"]
        envFrom:
        - configMapRef:
            name: chatwoot-config
        env:
        - name: POSTGRES_PASSWORD
          value: "gkdldhs12#$"
        - name: SECRET_KEY_BASE
          value: "7ba8ef8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e"
      containers:
      - name: chatwoot-web
        image: chatwoot/chatwoot:latest
        command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
        envFrom:
        - configMapRef:
            name: chatwoot-config
        env:
        - name: POSTGRES_PASSWORD
          value: "gkdldhs12#$"
        - name: SECRET_KEY_BASE
          value: "7ba8ef8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e"
        resources:
          # 💡 메모리를 2GB로 넉넉히 주어 자폭을 방지합니다.
          requests:
            memory: "1Gi"
          limits:
            memory: "2Gi"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: chatwoot-service
spec:
  selector:
    app: chatwoot-web
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30300
  type: NodePort
