apiVersion: v1
kind: ConfigMap
metadata:
  name: asterisk-config
data:
  # 💡 Asterisk 관리자 접속 설정
  manager.conf: |
    [general]
    enabled = yes
    port = 5038
    bindaddr = 0.0.0.0

    [admin]
    secret = gkdldhs12#$
    read = system,call,log,verbose,agent,user,config,dtmf,reporting,cdr,dialplan
    write = system,call,log,verbose,agent,user,config,dtmf,reporting,cdr,dialplan
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-asterisk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erp-asterisk
  template:
    metadata:
      labels:
        app: erp-asterisk
    spec:
      # 💡 실시간 전화 통신을 위해 호스트 네트워크 사용
      hostNetwork: true
      containers:
      - name: asterisk
        image: andrius/asterisk:latest
        securityContext:
          privileged: true
        volumeMounts:
        - name: config-volume
          mountPath: /etc/asterisk/manager.conf
          subPath: manager.conf
      volumes:
      - name: config-volume
        configMap:
          name: asterisk-config
---
apiVersion: v1
kind: Service
metadata:
  name: erp-asterisk-service
spec:
  selector:
    app: erp-asterisk
  ports:
    - name: ami
      protocol: TCP
      port: 5038
      targetPort: 5038
    - name: sip
      protocol: UDP
      port: 5060
      targetPort: 5060
  type: NodePort
