name: Build & Push to GHCR

on:
  push:
    branches: ["develop"]
    paths:
      - "**/*.vue"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "nginx.conf"
      - ".github/workflows/github-actions.yml"

jobs:
  docker:
    runs-on: self-hosted
    concurrency:
      group: develop-build
      cancel-in-progress: true

    env:
      TZ: Asia/Seoul
      GHCR_IMAGE: ghcr.io/haionnet/erp-frontend     # ← 조직명으로 교체
      KUBECONFIG: /home/githubrunner/.kube/config

    permissions:
      contents: read
      packages: write      # ← GHCR 푸시에 필수

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # 버전업데이트
      - name: Generate version.json
        run: |
          echo "{\"version\":\"$(date '+%Y-%m-%dT%H:%M:%S%z')-${GITHUB_SHA::7}\"}" > public/version.json

      # .env 파일 생성
      - name: Create .env
        # secrets.VITE_API_URL 은 레포세팅/Secrets and variables 안에 있습니다.
        run: |
          cat > .env <<EOF
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_MAIL_URL=${{ secrets.VITE_MAIL_URL }}
          VITE_BAL_URL=${{ secrets.VITE_BAL_URL }}
          EOF

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR 로그인 (PAT 불필요, GITHUB_TOKEN 사용)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # 자동생성
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub Actions가 실행될 때 자동으로 생성되는 토큰

      # 태그/라벨 자동 생성 (latest, branch, sha)
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/erp-frontend # 자동생성
          tags: |
            type=raw,value=latest

      - name: Build & Push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }} # 자동생성
          labels: ${{ steps.meta.outputs.labels }} # 자동생성
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 쿠버네티스 배포 재시작 단계 (기존 유지)
      - name: Restart Kubernetes Deployment
        run: |
          kubectl rollout restart deployment erp-frontend -n erp

  # 최근 1개를 제외하고 GHCR 컨테이너 패키지 버전 삭제
  cleanup:
    needs: docker
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Keep only the most recent 1 image version
        uses: actions/delete-package-versions@v5
        with:
          # 컨테이너 패키지명은 '이미지명'만 적음 (owner는 별도 지정)
          package-name: erp-frontend
          package-type: container
          min-versions-to-keep: 1
          owner: ${{ github.repository_owner }} # 자동생성